---
- name: Install kubectl on local machine
  hosts: localhost
  connection: local
  become: true
  tasks:
    - name: Get the latest stable Kubernetes version
      ansible.builtin.uri:
        url: https://dl.k8s.io/release/stable.txt
        return_content: true
      register: _k8s_version

    - name: Download and install kubectl
      ansible.builtin.get_url:
        url: "https://dl.k8s.io/release/{{ _k8s_version.content | trim }}/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: '0755'
        owner: root
        group: root

    - name: Verify kubectl installation
      ansible.builtin.command: kubectl version --client
      changed_when: false
      register: _kubectl_version

    - name: Show kubectl version
      ansible.builtin.debug:
        msg: "{{ _kubectl_version.stdout }}"

# 2단계: Master Node에서 kubeconfig 파일 가져오기
- name: Fetch kubeconfig from master node
  hosts: master
  become: true
  tasks:
    - name: Fetch admin.conf to control node
      ansible.builtin.fetch:
        src: /etc/kubernetes/admin.conf
        dest: /tmp/k8s_admin.conf
        flat: yes

# 3단계: Control Node에서 설정 적용
- name: Configure kubeconfig on local machine
  hosts: localhost
  connection: local
  tasks:
    - name: Ensure .kube directory exists
      ansible.builtin.file:
        path: "~/.kube"
        state: directory
        mode: '0755'

    - name: Move and secure kubeconfig
      ansible.builtin.copy:
        src: /tmp/k8s_admin.conf
        dest: "~/.kube/config"
        mode: '0600'
        remote_src: false
        owner: "{{ ansible_user_id }}"

    - name: Verify cluster access
      ansible.builtin.command: kubectl cluster-info
      register: _cluster_info
      changed_when: false

    - name: Display cluster info
      ansible.builtin.debug:
        msg: "{{ _cluster_info.stdout }}"
