---
# tasks for k8s_startup.yml
# ==========================================
# [1] : Master Node Startup & Uncordon
# ==========================================
- name: Startup and Uncordon Master Node
  hosts: master
  become: yes

  tasks:
    - name: Ensure container runtime is running on master
      systemd:
        name: crio
        state: started
        enabled: yes

    - name: Ensure kubelet is running on master
      systemd:
        name: kubelet
        state: started
        enabled: yes

    # Wait Until Port 6443 is Started
    - name: Wait for Kubernetes API Server port to be open
      wait_for:
        host: 127.0.0.1
        port: 6443
        state: started
        delay: 5
        timeout: 120

    - name: Wait for master node to be Ready
      command: kubectl wait --for=condition=Ready node/{{ inventory_hostname }} --timeout=120s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Uncordon the master node
      command: kubectl uncordon {{ inventory_hostname }}
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"


# ==========================================
# [2] : Worker Node Startup & Uncordon
# ==========================================
- name: Startup and Uncordon Worker Nodes
  hosts: workers
  become: yes

  tasks:
    - name: Ensure container runtime is running on worker
      systemd:
        name: crio
        state: started
        enabled: yes

    - name: Ensure kubelet is running on worker
      systemd:
        name: kubelet
        state: started
        enabled: yes

    - name: Wait for worker node to be Ready
      command: kubectl wait --for=condition=Ready node/{{ inventory_hostname }} --timeout=120s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      delegate_to: "{{ groups['master'][0] }}"

    - name: Uncordon the worker node
      command: kubectl uncordon {{ inventory_hostname }}
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      delegate_to: "{{ groups['master'][0] }}"


# ==========================================
# [3] : Reset Cilium Pods Restart Count
# ==========================================
- name: Restart Cilium DaemonSets to Clear Restart Counts
  hosts: master
  become: yes

  tasks:
    # Wait Until All Nodes to be Uncordoned
    - name: Pause for 10 seconds before restarting Cilium
      pause:
        seconds: 10

    - name: Rollout restart ds/cilium
      command: kubectl rollout restart ds/cilium -n kube-system
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Rollout restart ds/cilium-envoy
      command: kubectl rollout restart ds/cilium-envoy -n kube-system
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    # Wait Until All Cilium Pods to be Ready
    - name: Wait for Cilium rollout to complete
      command: kubectl rollout status ds/cilium -n kube-system --timeout=120s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Wait for Cilium Envoy rollout to complete
      command: kubectl rollout status ds/cilium-envoy -n kube-system --timeout=120s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
