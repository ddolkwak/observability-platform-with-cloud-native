---
# Cluster Deployment Playbook
#
# ===============================================
# Phase 1: Core Cluster Setup
# ===============================================
- name: 1.1 Setup Common Requirements on all nodes
  hosts:
    - master
    - workers
  become: yes
  roles:
    - common

- name: 1.2 Initialize Master Node
  hosts: master
  become: yes
  roles:
    - master

- name: 1.3 Join Worker Nodes to Cluster
  hosts: workers
  become: yes
  roles:
    - worker

- name: 1.4 Install Helm Package Manager
  hosts: master
  become: yes
  roles:
    - helm

- name: 1.5 Install MetalLB
  hosts: master
  become: yes
  roles:
    - metallb

- name: 1.6 Install Metrics-Server
  hosts: master
  become: yes
  roles:
    - metrics-server
  tags:
    - metrics_server
