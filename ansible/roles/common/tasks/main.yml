---
# tasks file for common
# 1. Swap 메모리 즉시 끄기 및 영구 비활성화
- name: Disable swap immediately
  command: swapoff -a
  when: ansible_swaptotal_mb > 0

- name: Disable swap permanently in /etc/fstab
  replace:
    path: /etc/fstab
    regexp: '^([^#].*?\sswap\s+sw\s+.*)$'
    replace: '# \1'

# 2. 커널 모듈 로드
- name: Load kernel modules for k8s immediately
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Create modules-load.d configuration file for K8s
  copy:
    content: |
      overlay
      br_netfilter
    dest: /etc/modules-load.d/k8s.conf
    mode: '0644'

# 3. K8s 네트워킹을 위한 sysctl 파라미터 적용
- name: Set sysctl parameters for K8s
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
  loop:
    - { name: 'net.ipv4.ip_forward', value: '1' }
    - { name: 'net.bridge.bridge-nf-call-iptables', value: '1' }
    - { name: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }

# 4. 필수 패키지 설치
- name: Install prerequisite packages
  apt:
    name: ['apt-transport-https', 'ca-certificates', 'curl', 'gpg']
    state: present
    update_cache: yes

# 6. GPG Keyrings 디렉토리 생성
- name: Create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

# 7. CRI-O 저장소 세팅 (v1.30 기준)
- name: Download CRI-O GPG key
  get_url:
    url: https://pkgs.k8s.io/addons:/cri-o:/stable:/v1.30/deb/Release.key
    dest: /tmp/cri-o-release.key

- name: Dearmor CRI-O GPG key
  command: gpg --dearmor -o /etc/apt/keyrings/cri-o-apt-keyring.gpg /tmp/cri-o-release.key
  args:
    creates: /etc/apt/keyrings/cri-o-apt-keyring.gpg

- name: Add CRI-O apt repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/cri-o-apt-keyring.gpg] https://pkgs.k8s.io/addons:/cri-o:/stable:/v1.30/deb/ /"
    state: present
    filename: cri-o

# 8. K8s 저장소 세팅 (v1.30 기준)
- name: Download K8s GPG key
  get_url:
    url: https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key
    dest: /tmp/kubernetes-release.key

- name: Dearmor K8s GPG key
  command: gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg /tmp/kubernetes-release.key
  args:
    creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

- name: Add Kubernetes apt repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.30/deb/ /"
    state: present
    filename: kubernetes

# 9. CRI-O 및 K8s 컴포넌트 설치
- name: Install cri-o, kubelet, kubeadm, kubectl
  apt:
    name: ['cri-o', 'kubelet', 'kubeadm', 'kubectl']
    state: present
    update_cache: yes

- name: Prevent K8s packages from being upgraded automatically
  command: apt-mark hold cri-o kubelet kubeadm kubectl

# 10. CRI-O 서비스 활성화 및 시작
- name: Enable and start CRI-O service
  service:
    name: crio
    state: restarted
    enabled: yes

# 11. 다중 네트워크 인터페이스 환경을 위한 Node IP 고정 설정
- name: Configure kubelet node-ip for multi-nic environment
  lineinfile:
    path: /etc/default/kubelet
    line: "KUBELET_EXTRA_ARGS=--node-ip={{ ansible_host }}"
    create: yes
  notify: restart_kubelet
