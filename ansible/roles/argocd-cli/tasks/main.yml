---
# tasks file for argocd-cli
- name: Determine OS architecture for Argo CD CLI
  ansible.builtin.set_fact:
    os_arch: >-
      {%- if ansible_architecture == 'x86_64' -%}amd64
      {%- elif ansible_architecture == 'aarch64' -%}arm64
      {%- else -%}{{ ansible_architecture }}
      {%- endif -%}

- name: Download Argo CD CLI binary
  become: true
  ansible.builtin.get_url:
    url: "https://github.com/argoproj/argo-cd/releases/download/{{ argocd_version }}/argocd-linux-{{ os_arch }}"
    dest: "{{ argocd_cli_bin_path }}"
    mode: '0755'
    owner: root
    group: root

- name: Configure argocore alias in bashrc
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.bashrc"
    regexp: "^alias argocore="
    line: "alias argocore='KUBECONFIG={{ kubeconfig_default_path }} argocd --core'"
    create: true
    mode: '0644'
